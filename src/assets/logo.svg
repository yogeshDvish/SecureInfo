<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7da2a9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a7a82;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.04" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bgGrad)" />

  <!-- Subtle inner ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="white" stroke-width="0.8" stroke-opacity="0.2" />

  <!-- Shield body -->
  <path d="M50 18 L72 27 L72 50 Q72 66 50 78 Q28 66 28 50 L28 27 Z"
        fill="url(#shieldGrad)"
        stroke="white"
        stroke-width="1.8"
        stroke-opacity="0.9"
        stroke-linejoin="round" />

  <!-- Lock body -->
  <rect x="40" y="50" width="20" height="15" rx="2.5" ry="2.5"
        fill="white" fill-opacity="0.95" />

  <!-- Lock shackle -->
  <path d="M44 50 L44 44 Q44 39 50 39 Q56 39 56 44 L56 50"
        fill="none"
        stroke="white"
        stroke-width="2.8"
        stroke-opacity="0.95"
        stroke-linecap="round" />

  <!-- Keyhole dot -->
  <circle cx="50" cy="56" r="2" fill="#7da2a9" />

  <!-- Keyhole slot -->
  <rect x="49" y="57" width="2" height="4" rx="1" fill="#7da2a9" />

  <!-- Pixel dots (steganography hint) — subtle bottom right -->
  <rect x="68" y="68" width="3" height="3" rx="0.5" fill="white" fill-opacity="0.5" />
  <rect x="73" y="68" width="3" height="3" rx="0.5" fill="white" fill-opacity="0.3" />
  <rect x="68" y="73" width="3" height="3" rx="0.5" fill="white" fill-opacity="0.3" />
  <rect x="73" y="73" width="3" height="3" rx="0.5" fill="white" fill-opacity="0.5" />
</svg>
